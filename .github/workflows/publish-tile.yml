name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Skill review (quality gate)
        run: |
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            echo "::group::Reviewing $(basename $skill_dir)"
            tessl skill review --threshold 85 "$skill_dir/SKILL.md"
            echo "::endgroup::"
          done

      - name: Lint tile
        run: tessl tile lint .

      - uses: jbaruch/tessl-smart-publish@v1
        id: publish

      - name: Commit version bump
        run: |
          if git diff --quiet tile.json; then
            echo "No version change to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add tile.json
            git commit -m "chore: bump version to $(jq -r .version tile.json) [skip ci]"
            git push
          fi
