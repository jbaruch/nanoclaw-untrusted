name: Review & Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: tesslio/setup-tessl@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Skill review (quality gate)
        run: |
          FAILED=0
          for skill_dir in skills/*/; do
            [ -f "$skill_dir/SKILL.md" ] || continue
            echo "Reviewing $skill_dir..."
            if ! tessl skill review --threshold 85 "$skill_dir/SKILL.md"; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more skills failed the 85% quality gate"
            exit 1
          fi

      - name: Lint tile
        run: tessl tile lint .

      - uses: jbaruch/tessl-smart-publish@main
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
